<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ann Debbie Bedrijo | Strategic VA & Bookkeeper</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-teal: #004D4D;
            --muted-gold: #C5A059;
            --warm-beige: #F9F7F2;
            --charcoal: #333333;
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--white);
            color: var(--charcoal);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid var(--light-gray);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--midnight-teal);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* --- HERO SECTION --- */
        .hero {
            background-color: var(--warm-beige);
            padding: 120px 5% 100px;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            color: var(--midnight-teal);
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 35px;
            color: #555;
        }

        .btn-primary {
            background-color: var(--midnight-teal);
            color: var(--white);
            padding: 18px 45px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background-color: var(--muted-gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- ABOUT ME SECTION --- */
        .about-section {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 60px;
            align-items: center;
        }

        .about-image img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 20px 20px 0px var(--warm-beige);
            border: 1px solid #eee;
        }

        .about-content h2 { text-align: left; margin-top: 0; }
        .sub-headline { color: var(--muted-gold); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 10px; display: block; }

        /* --- PROJECTS SECTION --- */
        .projects-section {
            background: var(--light-gray);
            padding: 100px 0;
        }

        .project-card {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: center;
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }

        .project-img-container img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--muted-gold);
        }

        /* --- SERVICES GRID --- */
        .section-header { text-align: center; margin-bottom: 60px; }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            padding: 45px 30px;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            text-align: center;
            transition: 0.3s ease;
        }

        .card.premium { background-color: var(--warm-beige); border: 1px solid var(--muted-gold); }
        .card h3 { font-family: 'Playfair Display', serif; color: var(--midnight-teal); margin-bottom: 15px; }
        .card ul { list-style: none; padding: 0; text-align: left; display: inline-block; }
        .card li { margin: 12px 0; display: flex; align-items: center; font-size: 0.95rem; }
        .card li::before { content: '•'; color: var(--muted-gold); font-weight: bold; margin-right: 10px; font-size: 1.5rem; }

        /* --- TOOLS & EXPERTISE (ENHANCED) --- */
        .tools-section {
            background-color: var(--midnight-teal);
            padding: 80px 40px;
            border-radius: 25px;
            text-align: center;
            color: var(--white);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .tool-icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .tool-icon-box img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: brightness(0) invert(1); /* Makes logos white */
            opacity: 0.7;
            transition: 0.3s;
        }
